<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>quietloudlab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <script>
      // GitHub Pages SPA fallback — based on rafgraph/spa-github-pages.
      // Redirects any missing path to index.html, preserving the path in the query
      // string so the app can restore it with history.replaceState.
      (function () {
        var pathSegmentsToKeep = 0; // apex domain deployment
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }());
    </script>
  </head>
  <body></body>
</html>
